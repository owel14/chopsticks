name: Deploy server to VPS

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'docker-compose.yml'
      - 'Caddyfile'
      - '.github/workflows/deploy-vps.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Require SSH host fingerprint
        run: test -n "${{ secrets.VPS_SSH_FINGERPRINT }}"

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          fingerprint: ${{ secrets.VPS_SSH_FINGERPRINT }}
          script: |
            set -euo pipefail
            cd ~/apps/chopsticks
            git pull --ff-only
            docker compose up -d --build
            docker image prune -f
