services:
  chopsticks-server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: chopsticks-server
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:5000
      # Caddy is the hostname trust boundary in this deployment, so the
      # app-level host filter can safely accept anything on the internal net.
      - AllowedHosts=*
      # CorsOrigins__N overrides the CorsOrigins[] array in appsettings.json
      # at runtime. Add every frontend origin that should be allowed to connect.
      - CorsOrigins__0=https://chopsticks-online.vercel.app
      # - CorsOrigins__1=https://your-custom-frontend-domain.example
    ports:
      # Bound to loopback only — not reachable from outside the VPS.
      # The host Caddy instance proxies to this port.
      - "127.0.0.1:5002:5000"
